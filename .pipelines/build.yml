# Starter pipeline
name: 1.0.3.$(rev:r)
variables: 
- name: Project.Path
  value: '**/PolyhydraGames.Spotify.csproj'
- name: Project.Test
  value: '**/PolyhydraGames.Spotify.Test.csproj'  
- name: BuildConfiguration
  value: Release
trigger:
  branches:
    include:
    - refs/heads/main
  paths:
    include:
    - Spotify

jobs:
- job: Phase_1 
  cancelTimeoutInMinutes: 1
  pool:
    name: Default
  steps:
  - checkout: self
  - task: DotNetCoreCLI@2
    displayName: dotnet test
    inputs:
      command: test
      projects: $(Project.Test) 
      arguments: '--collect "XPlat Code coverage;;Format=cobertura,opencover"'
  - task: PublishCodeCoverageResults@2
    inputs:
      summaryFileLocation: '$(Agent.TempDirectory)/**/*cobertura.xml'
      #coverage.opencover.xml
      pathToSources: 'OAuth.Core'
      failIfCoverageEmpty: false  
  - task: DotNetCoreCLI@2
    inputs:
      command: 'pack'
      packagesToPack: '$(Project.Path)' 
      versioningScheme: 'byBuildNumber'
  - task: DotNetCoreCLI@2
    inputs:
      command: 'push'
      packagesToPush: '$(Build.ArtifactStagingDirectory)/*.nupkg'
      nuGetFeedType: 'internal'
      publishVstsFeed: '015fc12f-cd63-4ab4-8d6a-dc889e53bf70'